<!DOCTYPE html>
<html>
<head>
  <title>LearItNow - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h1 style="text-align:center;margin-top:10px;">LearnItNow</h1>
<nav>
  <h2>Dashboard</h2>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="goTyping()">Typing</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

<div class="card">
  <h3 id="info"></h3>
</div>

<div class="card">
  <h3>Study Planner</h3>

  <input id="task" placeholder="Task">
  <input id="date" type="date">
  <input id="duration" placeholder="Time (minutes)">
  <button onclick="addTask()">Add Task</button>

  <ul id="taskList"></ul>
</div>

<div class="card">
  <h3>Performance Chart</h3>
  <canvas id="chart"></canvas>
</div>

</div>
<script>
    function goTyping(){window.location="typing.html";}
    function logout(){localStorage.removeItem("currentUser");window.location="index.html";}
</script>
<script src="js/theme.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
